
[project]
python = "^3.14"
name = "eps-repo-status"

[tool.poetry]
name = "eps-repo-status"
version = "0.0.1-alpha"
description = "EPS VPC Resources"
license = "MIT"
authors = [
    "EPS"
]
readme = "README.md"
repository = "https://github.com/NHSDigital/eps-repo-status"
package-mode = false

[tool.poetry.dependencies]
