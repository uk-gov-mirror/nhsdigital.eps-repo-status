[tool.poetry.scripts]

[tool.poetry.group.dev.dependencies]
pre-commit = "^4.1.0"
pytest = "^9.0.2"
pytest-cov = "^7.0.0"
black = "^26.3.1"
flake8 = "^7.3.0"

[tool.black]
line-length = 120
